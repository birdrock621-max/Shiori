name: Quality checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: shiori-source-${{ github.sha }}
          path: |
            .
            !.git/**
            !node_modules/**
            !dist/**
          include-hidden-files: true
          retention-days: 1

      - name: Download exact hero assets for visual audit
        shell: bash
        run: |
          mkdir -p /tmp/shiori-hero-assets
          curl --fail --location --retry 3 \
            'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260609_195923_b0ba8ace-1d1d-4f2c-9a28-1ab84b330680.png&w=1280&q=85' \
            --output /tmp/shiori-hero-assets/strata-base.webp
          curl --fail --location --retry 3 \
            'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260609_201152_bba90a12-bf12-459f-91f0-51f237dbaf3b.png&w=1280&q=85' \
            --output /tmp/shiori-hero-assets/strata-reveal.webp
          file /tmp/shiori-hero-assets/*.webp

      - name: Export exact hero assets
        uses: actions/upload-artifact@v4
        with:
          name: shiori-exact-hero-assets-${{ github.sha }}
          path: /tmp/shiori-hero-assets
          retention-days: 1

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate records and source
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Test empty and large archives
        run: npm run test:scenarios
