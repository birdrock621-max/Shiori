name: 不具合報告
description: 表示や操作の問題を報告します（秘密情報は書かないでください）
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        報告ありがとうございます。個人の日記、実在する連絡先、APIキー、非公開画像は貼らず、架空データへ置き換えてください。セキュリティ問題は公開Issueではなく SECURITY.md の方法で報告してください。
  - type: textarea
    id: summary
    attributes:
      label: 起きたこと
      description: 期待した動作と、実際の動作を簡潔に書いてください。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1. ...を開く
        2. ...を選ぶ
        3. ...になる
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Shioriのバージョンまたはcommit
      placeholder: v1.0.0
  - type: dropdown
    id: viewport
    attributes:
      label: 端末
      options:
        - PC
        - スマートフォン
        - タブレット
        - 複数
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: ブラウザとバージョン
      placeholder: Chrome 149
  - type: textarea
    id: additional
    attributes:
      label: 追加情報
      description: 個人情報を除いた最小fixtureやスクリーンショットがあれば添えてください。
  - type: checkboxes
    id: safety
    attributes:
      label: 公開範囲の確認
      options:
        - label: このIssueに秘密情報・個人記録・第三者情報を含めていません。
          required: true
