name: 機能提案
description: Shioriを長く使いやすくする提案
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題
      description: 実装方法ではなく、どんな場面で誰が困るかを書いてください。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案
      description: 期待する体験や、既存機能で解決できない理由を書いてください。
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: 導入の手軽さへの影響
      description: 環境変数、外部サービス、依存関係、JavaScript、移行作業が増える可能性があれば書いてください。
  - type: checkboxes
    id: principles
    attributes:
      label: 設計原則
      options:
        - label: データベースや秘密の設定を必須にしません。
          required: true
        - label: 個人記録や第三者情報を添付していません。
          required: true
