name: セキュリティ連絡（詳細禁止）
description: Private Vulnerability Reportが使えない場合の公開連絡口です
title: "[Security contact] "
labels:
  - security
body:
  - type: markdown
    attributes:
      value: |
        **このIssueと添付ファイルは公開されます。脆弱性の詳細、再現手順、攻撃コード、個人情報、秘密情報を書かないでください。**

        先に Security → Advisories → Report a vulnerability が使えるか確認してください。このIssueは、非公開報告機能を利用できないことを保守者へ知らせるためだけに使います。
  - type: dropdown
    id: affected
    attributes:
      label: 影響するバージョン
      options:
        - 1.x
        - main
        - 不明
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: 公開範囲の確認
      options:
        - label: このIssueに脆弱性の詳細、再現手順、秘密情報を含めていません
          required: true
